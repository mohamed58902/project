<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo&display=swap">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(to right, rgba(45,116,213,1) 11.2%, rgba(121,137,212,1) 91.2%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .login-container label {
            display: block;
            text-align: right;
            margin-bottom: 5px;
            color: #555;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-container button {
            background-color: #2d74d5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #1e5bbf;
        }
        .login-container .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <label for="fullName">الاسم الثلاثي أو الرباعي:</label>
            <input type="text" id="fullName" name="fullName" placeholder="اكتب اسمك الكامل هنا" required>

            <div class="error" id="errorMsg"></div>

            <button type="button" onclick="handleLogin()">تسجيل الدخول</button>
        </form>
    </div>

    <script>
        // إضافة اسم محمد إحسان محمود تلقائياً
        document.addEventListener('DOMContentLoaded', () => {
            const fullNameInput = document.getElementById('fullName');
            fullNameInput.value = 'محمد إحسان محمود';
        });

        function handleLogin() {
            const fullName = document.getElementById('fullName').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (fullName.split(' ').length < 3) {
                errorMsg.textContent = 'يجب إدخال الاسم الثلاثي على الأقل';
                return;
            }

            // منع تسجيل الدخول بأكثر من جهاز
            if (localStorage.getItem('loggedUser') === fullName) {
                errorMsg.textContent = 'تم تسجيل الدخول مسبقًا بهذا الاسم من جهاز آخر.';
                return;
            }

            // حفظ بيانات المستخدم في التخزين المحلي
            localStorage.setItem('loggedUser', fullName);

            // إعادة التوجيه إلى الصفحة الرئيسية
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
